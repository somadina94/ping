name: ping-server

services:
  mongo:
    image: mongo:latest
    container_name: ping-mongo
    command: ["mongod", "--quiet"]
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ping-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ping-server
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      # Override loopback DATABASE from host .env — localhost inside the container is wrong.
      DATABASE: ${DOCKER_DATABASE:-mongodb://mongo:27017/ping}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/v1/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - ping-network

volumes:
  mongo-data:

networks:
  ping-network:
    driver: bridge
