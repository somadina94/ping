name: ping-server

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ping-server
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/v1/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - ping-network

networks:
  ping-network:
    driver: bridge
